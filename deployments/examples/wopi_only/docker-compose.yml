  #    REVA_GATEWAY: ${REVA_GATEWAY:-com.owncloud.api.gateway}
  #    REVA_GATEWAY: 192.168.2.143:9142
  #    APP_PROVIDER_GRPC_ADDR: 0.0.0.0:9164
